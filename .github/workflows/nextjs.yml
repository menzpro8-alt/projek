# Sample workflow for building and deploying a Next.js site to GitHub Pages via Bun
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Bun di Runner
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest # atau tentukan versi spesifik, misal: 1.1.0

      # 2. Setup Pages (Otomatis konfigurasi basePath Next.js)
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      # 3. Restore Cache untuk Next.js & Bun
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/bun.lock') }}-

      # 4. Install Dependencies menggunakan Bun
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 5. Build dengan Next.js via Bun
      - name: Build with Next.js
        run: bun run build

      # 6. Upload hasil build (Next.js SSG secara default menghasilkan folder ./out)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
